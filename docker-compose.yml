services:
  ganache:
    image: trufflesuite/ganache:latest
    ports:
      - "8545:8545"
    command: >
      --accounts 10
      --defaultBalanceEther 100
      --deterministic
      --host 0.0.0.0

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - ganache
    dns:
      - 8.8.8.8
      - 8.8.4.4
    # Corporate DNS may not resolve router.huggingface.co — inject IPs directly
    extra_hosts:
      - "router.huggingface.co:108.139.119.116"
    environment:
      - PYTHONUNBUFFERED=1
      - GANACHE_URL=http://ganache:8545
      - HF_TOKEN=${HF_TOKEN}
